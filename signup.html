<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - SoulSync</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>Create Your SoulSync Account</h1>
    </header>
    <main>
      <form id="signupForm" class="profile-form">
        <div class="form-group">
          <label for="name">Name</label><input type="text" id="name" required placeholder="Your full name" />
        </div>
        <div class="form-group">
          <label for="email">Email ID</label><input type="email" id="email" required placeholder="your.email@example.com" />
        </div>
        <div class="form-group">
          <label for="password">Password</label><input type="password" id="password" required placeholder="Create a password" />
        </div>
        <div class="form-group">
          <label for="phone">Phone No</label><input type="tel" id="phone" placeholder="Optional" />
        </div>
        <div class="form-group">
          <label for="age">Age</label><input type="number" id="age" placeholder="Optional" />
        </div>
        <div class="form-group">
          <label for="gender">Gender</label><select id="gender">
            <option value="prefer-not-to-say" selected>Prefer not to say</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="non-binary">Non-binary</option>
          </select>
        </div>
        <span id="responseMessage" style="color: red; font-size: 14px;"></span>
        <button type="submit" class="btn">Create Account & Continue</button>
        <a href="login.html" style="display: block; text-align: center; margin-top: 15px; color: var(--primary-text);">Already have an account? Log In</a>
      </form>
    </main>
  </div>
  <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        phone: document.getElementById("phone").value || null,
        age: parseInt(document.getElementById("age").value) || null,
        gender: document.getElementById("gender").value
      };

      try {
        const response = await fetch('http://localhost:3000/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(user)
        });

        const data = await response.json();
        
        if (response.ok) {
          // Save user data to localStorage
          localStorage.setItem('currentUserId', data.userId);
          localStorage.setItem('userRole', data.role);
          localStorage.setItem('authToken', data.token);
          
          // Redirect to questionnaire for mandatory assessment
          window.location.href = "questionnaire.html?firstLogin=true";
        } else {
          document.getElementById('responseMessage').innerText = data.message || "Signup failed.";
        }
      } catch (error) {
        document.getElementById('responseMessage').innerText = "Error: Server not reached.";
        console.error(error);
      }
    });
  </script>
</body>

</html>
