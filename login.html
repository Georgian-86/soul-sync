<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - SoulSync</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Welcome Back</h1>
        </header>
        <main>
            <form id="loginForm" class="profile-form">
                <div class="form-group"><label for="email">Enter Your Email ID</label><input value="demo@demo.com"
                        type="email" id="email" required><span id="responseMessage"></span> </div>
                <button type="submit" class="btn">Log In</button>
                <a href="index.html"
                    style="display: block; text-align: center; margin-top: 15px; color: var(--primary-text);">Back
                    to
                    Welcome</a>
            </form>
        </main>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = { email: document.getElementById('email').value };

            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = JSON.parse(await response.text());
                if (data.message === "User found") {
                    localStorage.setItem('currentUserId', data.userId);
                    localStorage.setItem('userRole', data.role);
                    
                    // Redirect based on role
                    if (data.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else if (data.role === 'doctor') {
                        window.location.href = 'doctor-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    document.getElementById('responseMessage').innerText = data.message;
                }
            } catch (error) {
                console.error(error);
                document.getElementById('responseMessage').innerText = 'Login failed. Please try again.';
            }
        });
    </script>
</body>

</html>
