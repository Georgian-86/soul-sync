<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - SoulSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #eaf4ff 0%, #f0e7ff 100%); }

        /* Sidebar */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 240px; height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white; padding: 24px 16px; display: flex; flex-direction: column; z-index: 100;
            transition: width 0.3s cubic-bezier(.4,0,.2,1);
        }
        .sidebar-logo { font-size: 20px; font-weight: 700; margin-bottom: 40px; padding: 0 8px; display: flex; align-items: center; gap: 10px; }
        .sidebar-logo span { font-size: 24px; }
        .nav-links { list-style: none; flex: 1; }
        .nav-links li { margin-bottom: 4px; }
        .nav-links a {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            color: rgba(255,255,255,0.6); text-decoration: none; border-radius: 10px;
            font-size: 14px; font-weight: 500; transition: all 0.2s;
        }
        .nav-links a:hover { color: white; background: rgba(255,255,255,0.1); }
        .nav-links a.active { background: rgba(102,126,234,0.3); color: #a8b8ff; }
        .nav-icon { font-size: 18px; width: 24px; text-align: center; }
        .sidebar-footer { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 16px; }
        .user-card { display: flex; align-items: center; gap: 10px; padding: 8px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
        .user-name { font-size: 13px; font-weight: 600; }
        .user-role { font-size: 11px; color: rgba(255,255,255,0.5); }
        .logout-btn { display: block; width: 100%; padding: 10px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: transparent; color: rgba(255,255,255,0.6); cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        /* Collapsible Sidebar */
        .sidebar.collapsed { width: 64px; padding: 24px 8px; }
        .sidebar.collapsed .sidebar-logo span:last-child,
        .sidebar.collapsed .nav-links a span:not(.nav-icon),
        .sidebar.collapsed .user-name,
        .sidebar.collapsed .user-role,
        .sidebar.collapsed .logout-btn { display: none; }
        .sidebar.collapsed .nav-links a { justify-content: center; padding: 12px; }
        .sidebar.collapsed .user-card { justify-content: center; }
        .sidebar.collapsed .logout-btn { font-size: 0; padding: 10px; text-align: center; }
        .sidebar.collapsed .logout-btn::before { content: '🚪'; font-size: 16px; }
        .sidebar-toggle {
            position: absolute; top: 28px; right: -14px; width: 28px; height: 28px;
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.15);
            background: #1a1a2e; color: white; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 12px;
            transition: all 0.2s; z-index: 101;
        }
        .sidebar-toggle:hover { background: #16213e; }

        .main { margin-left: 240px; padding: 24px 32px; transition: margin-left 0.3s cubic-bezier(.4,0,.2,1); }
        .main.expanded { margin-left: 64px; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 24px 8px; }
            .sidebar-logo span:last-child, .nav-links a span:not(.nav-icon), .user-name, .user-role { display: none; }
            .main { margin-left: 60px; }
        }

        .game-main { text-align: center; max-width: 800px; margin: 0 auto; padding: 20px; }
        .game-main h1 { margin-bottom: 12px; }
        .game-description { color: #888; margin-bottom: 24px; font-style: italic; }
        .game-card { display: flex; flex-direction: column; align-items: center; background-color: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1); margin-top: 20px; }
        #bubbleCanvas { border: 2px solid #a6c1ee; border-radius: 10px; background: linear-gradient(to bottom, #eaf4ff, #fff); cursor: pointer; }
        .game-controls { display: flex; justify-content: space-between; align-items: center; width: 700px; max-width: 100%; margin-top: 20px; }
        .score { font-size: 1.2rem; color: #5c5c8e; font-weight: 500; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle sidebar">◀</button>
        <div class="sidebar-logo"><span>🧠</span><span>Soul-Sync</span></div>
        <ul class="nav-links">
            <li><a href="patient-dashboard.html"><span class="nav-icon">📊</span><span>Dashboard</span></a></li>
            <li><a href="journal.html"><span class="nav-icon">📓</span><span>Journal</span></a></li>
            <li><a href="art.html"><span class="nav-icon">🎨</span><span>Art Therapy</span></a></li>
            <li><a href="music.html"><span class="nav-icon">🎵</span><span>Music</span></a></li>
            <li><a href="game.html" class="active"><span class="nav-icon">🎮</span><span>Games</span></a></li>
            <li><a href="questionnaire.html"><span class="nav-icon">📋</span><span>Assessment</span></a></li>
            <li><a href="profile.html"><span class="nav-icon">👤</span><span>Profile</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-card">
                <div class="user-avatar" id="avatarInitial">?</div>
                <div><div class="user-name" id="sidebarName">Loading...</div><div class="user-role">Patient</div></div>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
    </div>
    <!-- Main Content -->
    <div class="main" id="mainContent">
        <main class="game-main">
            <h1>🎮 Stress Relief Game</h1>
            <p class="game-description">Pop the bubbles to relieve stress. They regenerate slowly, offering a moment of quiet focus.</p>

            <div class="game-card">
                <canvas id="bubbleCanvas" width="700" height="400"></canvas>
                <div class="game-controls">
                    <button id="resetButton" class="btn back-btn">Reset Bubbles</button>
                    <div class="score">Bubbles Popped: <span id="popCount">0</span></div>
                </div>
            </div>
        </main>
    </div>

    <audio id="popSound" src="https://cdn.pixabay.com/audio/2021/08/04/audio_3d19f5df1a.mp3" preload="auto"></audio>

    <script>
        // Auth & Sidebar
        const userId = localStorage.getItem('currentUserId');
        const userName = localStorage.getItem('userName');
        const API = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
        
        if (!userId) { window.location.href = 'login.html'; }
        
        // Check if assessment is completed
        async function checkAssessment() {
            try {
                const res = await fetch(`${API}/getUserDetails/${userId}`);
                if (res.ok) {
                    const user = await res.json();
                    if (user.questionnaire_completed === false) {
                        window.location.href = 'questionnaire.html?firstLogin=true';
                        return;
                    }
                }
            } catch (e) { console.error('Assessment check:', e); }
        }
        checkAssessment();
        
        if (userName) {
            document.getElementById('sidebarName').textContent = userName;
            document.getElementById('avatarInitial').textContent = userName.charAt(0).toUpperCase();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('mainContent');
            const toggleBtn = document.getElementById('sidebarToggle');
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
            toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
            localStorage.setItem('sidebarCollapsedGame', sidebar.classList.contains('collapsed'));
        }
        if (localStorage.getItem('sidebarCollapsedGame') === 'true') { toggleSidebar(); }

        function logout() { localStorage.clear(); window.location.href = 'login-page.html'; }

        // --- BUBBLE GAME LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('bubbleCanvas');
            const popCountEl = document.getElementById('popCount');
            const resetButton = document.getElementById('resetButton');
            const ctx = canvas.getContext('2d');
            
            // --- NEW LINE: Get the Audio Element ---
            const POP_SOUND = document.getElementById('popSound'); 

            const MAX_BUBBLES = 15;
            let bubbles = [];
            let popCount = 0;

            class Bubble {
                constructor(x, y, radius) {
                    this.x = x;
                    this.y = y;
                    this.radius = radius;
                    this.velocity = { x: (Math.random() - 0.5) * 0.5, y: (Math.random() * 0.5) + 0.1 }; // Slight upward bias
                    this.color = `rgba(166, 193, 238, ${0.4 + Math.random() * 0.3})`;
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                    
                    // Bubble body
                    ctx.fillStyle = this.color;
                    ctx.fill();

                    // Bubble highlight
                    ctx.beginPath();
                    ctx.arc(this.x - this.radius / 3, this.y - this.radius / 3, this.radius / 5, 0, Math.PI * 2, false);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.fill();

                    // Bubble outline
                    ctx.lineWidth = 1;
                    ctx.strokeStyle = `rgba(166, 193, 238, 0.8)`;
                    ctx.stroke();
                }

                update() {
                    // Reverse movement if hitting horizontal walls
                    if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                        this.velocity.x *= -1;
                    }

                    // Reverse movement if hitting top wall, but bubbles disappear at the bottom
                    if (this.y - this.radius < 0) {
                         this.velocity.y *= -1;
                    }
                    
                    // Apply velocity
                    this.x += this.velocity.x;
                    this.y -= this.velocity.y; // Y-axis moves upward (bubbles float)

                    this.draw();
                }
            }

            function createRandomBubble() {
                const radius = Math.random() * 20 + 15; // Radius between 15 and 35
                const x = Math.random() * (canvas.width - 2 * radius) + radius;
                const y = canvas.height + radius; // Start off-screen at the bottom
                bubbles.push(new Bubble(x, y, radius));
            }

            function initBubbles() {
                bubbles = [];
                popCount = 0;
                popCountEl.textContent = popCount;
                for (let i = 0; i < MAX_BUBBLES; i++) {
                    createRandomBubble();
                }
            }

            function animate() {
                requestAnimationFrame(animate);
                // Clear the canvas for the next frame, giving a faint trail
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                bubbles.forEach((bubble, index) => {
                    // Check if bubble has floated completely off the top screen
                    if (bubble.y + bubble.radius < 0) {
                        bubbles.splice(index, 1);
                        createRandomBubble(); // Replace the lost bubble immediately
                        return;
                    }
                    bubble.update();
                });

                // Regeneration: Add a new bubble occasionally if below MAX_BUBBLES
                if (bubbles.length < MAX_BUBBLES && Math.random() < 0.005) {
                    createRandomBubble();
                }
            }
            
            // Interaction: Pop the bubble on click
            canvas.addEventListener('click', (event) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = event.clientX - rect.left;
                const mouseY = event.clientY - rect.top;

                for (let i = bubbles.length - 1; i >= 0; i--) {
                    const bubble = bubbles[i];
                    const dist = Math.sqrt(Math.pow(mouseX - bubble.x, 2) + Math.pow(mouseY - bubble.y, 2));

                    if (dist < bubble.radius) {
                        // Pop the bubble
                        bubbles.splice(i, 1);
                        popCount++;
                        popCountEl.textContent = popCount;

                        // --- UPDATED SOUND LOGIC ---
                        POP_SOUND.currentTime = 0; // Rewind to start for quick, repeated clicks
                        POP_SOUND.play().catch(e => {
                            // Catching potential promise rejection (e.g., browser autoplay policy)
                            console.log("Audio playback prevented:", e);
                        });
                        
                        // Break after popping one to prevent popping multiple that overlap
                        break; 
                    }
                }
            });

            resetButton.addEventListener('click', initBubbles);

            initBubbles();
            animate();
        });
    </script>
</body>
</html>
